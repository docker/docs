# Syncs CLI reference YAML from upstream repositories.
#
# Runs on a schedule to auto-detect new releases, or manually via workflow_dispatch.
# For each configured upstream repo, runs the `docs-release` bake target via git
# context to generate YAML, copies it to data/cli/<folder>/, and opens a PR.
#
# Upstream contract: define a `docs-release` bake target that outputs YAML files
# to an `out/` directory. Example (in docker-bake.hcl):
#
#   target "docs-release" {
#     target = "docs-release"
#     output = ["out"]
#   }
#
# The Dockerfile stage should produce *.yaml CLI reference files in /out/.

name: sync-upstream-cli

on:
  schedule:
    # Check for new upstream releases daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Upstream repo (e.g., docker/buildx)"
        required: true
        type: choice
        options:
          - docker/buildx
          - docker/compose
          - docker/cli
          - docker/model-runner
      version:
        description: "Git tag to sync (e.g., v0.33.0). Leave empty to use latest release."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

# Each upstream repo and its corresponding data/cli/ subfolder.
# Add new entries here when onboarding a repo.
env:
  SETUP_BUILDX_VERSION: "edge"
  SETUP_BUILDKIT_IMAGE: "moby/buildkit:latest"

jobs:
  # Build the matrix of repos to sync.
  # On workflow_dispatch: sync only the selected repo.
  # On schedule: sync all configured repos.
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
    steps:
      - name: Build matrix
        id: matrix
        uses: actions/github-script@v7
        with:
          script: |
            // Upstream repos and their data/cli/ subfolder + hugo.yaml version key
            const repos = [
              { repo: "docker/buildx",        folder: "buildx" },
              { repo: "docker/compose",        folder: "compose" },
              { repo: "docker/cli",            folder: "engine" },
              { repo: "docker/model-runner",   folder: "model" },
            ];

            const input_repo = context.payload.inputs?.repo || "";
            const input_version = context.payload.inputs?.version || "";

            let matrix = [];
            for (const r of repos) {
              if (input_repo && r.repo !== input_repo) continue;

              // Get the version to sync
              let version = input_version;
              if (!version) {
                // Fetch latest release from GitHub
                try {
                  const { data: release } = await github.rest.repos.getLatestRelease({
                    owner: r.repo.split("/")[0],
                    repo: r.repo.split("/")[1],
                  });
                  version = release.tag_name;
                } catch (e) {
                  core.warning(`Could not fetch latest release for ${r.repo}: ${e.message}`);
                  continue;
                }
              }

              matrix.push({ ...r, version });
            }

            core.info(JSON.stringify(matrix, null, 2));
            return matrix;

  sync:
    needs: prepare
    if: ${{ fromJSON(needs.prepare.outputs.matrix).length > 0 }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      BRANCH: "bot/sync-${{ matrix.folder }}-cli"
    steps:
      - name: Checkout docker/docs
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if already synced
        id: check
        run: |
          # Check if a closed PR already exists for this version
          EXISTING=$(gh pr list --state all \
            --search "cli(${{ matrix.folder }}): sync docs ${{ matrix.version }} in:title" \
            --json state,url --jq '.[0].state // empty')

          if [ "$EXISTING" = "MERGED" ] || [ "$EXISTING" = "CLOSED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already synced ${{ matrix.repo }} ${{ matrix.version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}

      - name: Generate YAML
        if: steps.check.outputs.skip != 'true'
        uses: docker/bake-action@v7
        with:
          source: "${{ github.server_url }}/${{ matrix.repo }}.git#${{ matrix.version }}"
          targets: docs-release
          provenance: false
          set: |
            *.output=/tmp/docs-release

      - name: Copy data files
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p "data/cli/${{ matrix.folder }}"
          rm -f "data/cli/${{ matrix.folder }}"/*.yaml
          cp /tmp/docs-release/out/*.yaml "data/cli/${{ matrix.folder }}/"

      - name: Check for changes
        if: steps.check.outputs.skip != 'true'
        id: diff
        run: |
          git add "data/cli/${{ matrix.folder }}/"
          if git diff --cached --quiet; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected for ${{ matrix.repo }} ${{ matrix.version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git diff --cached --stat >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push
        if: steps.check.outputs.skip != 'true' && steps.diff.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "cli(${{ matrix.folder }}): sync docs ${{ matrix.version }}"
          git push -u origin "$BRANCH" --force

      - name: Create or update PR
        if: steps.check.outputs.skip != 'true' && steps.diff.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="cli(${{ matrix.folder }}): sync docs ${{ matrix.version }}"

          EXISTING=$(gh pr list --state open \
            --head "$BRANCH" --json url --jq '.[0].url // empty')

          BODY=$(cat <<EOF
          ## Summary

          Automated sync of CLI reference docs.

          | | |
          |---|---|
          | **Tool** | \`${{ matrix.folder }}\` |
          | **Version** | \`${{ matrix.version }}\` |
          | **Source** | [${{ matrix.repo }}@${{ matrix.version }}](${{ github.server_url }}/${{ matrix.repo }}/tree/${{ matrix.version }}) |
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing PR: $EXISTING" >> "$GITHUB_STEP_SUMMARY"
            git push -u origin "$BRANCH" --force
            gh pr edit "$EXISTING" --title "$TITLE" --body "$BODY"
          else
            echo "Creating new PR" >> "$GITHUB_STEP_SUMMARY"
            gh pr create --title "$TITLE" --base main --head "$BRANCH" --body "$BODY"
          fi
