---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    schedule:
      interval: daily
  - package-ecosystem: gomod
    directory: /
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: '*'
    schedule:
      interval: weekly
