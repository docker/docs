name: sbx setup
synopsis: |
    Detect host configuration and prepare Docker Sandboxes
experimental: true
description: |-
    Detect what is already configured on your host and prepare Docker Sandboxes.

    Agent secrets are detected from the built-in agent kit specs and the
    env vars set on this host, and accepted secrets are imported into the global
    secrets store (the same store as "sbx secret set -g").

      [g]      Get help with Gordon using the detected setup context
      [T]      toggle the detailed review table on/off
      ↑/↓      move between rows
      TAB      toggle import / skip for the selected row
      [enter]  accept and import
      [q]/esc  quit without importing
usage: sbx setup
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for setup
inherited_options:
    - name: debug
      shorthand: D
      default_value: "false"
      usage: Enable debug logging
see_also:
    - sbx - Manage AI coding agent sandboxes.
