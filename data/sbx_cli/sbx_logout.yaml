name: sbx logout
synopsis: Stop all running sandboxes and sign out of Docker
usage: sbx logout [flags]
options:
    - name: help
      shorthand: h
      default_value: "false"
      usage: help for logout
    - name: "yes"
      shorthand: "y"
      default_value: "false"
      usage: Skip confirmation prompt
inherited_options:
    - name: debug
      shorthand: D
      default_value: "false"
      usage: Enable debug logging
see_also:
    - sbx - Manage AI coding agent sandboxes.
